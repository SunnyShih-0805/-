<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>安全檢查</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
background:#101014;
color:white;
font-family:"Noto Sans TC",sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

h1{
font-weight:900;
letter-spacing:2px;
}

.box{
background:#222;
padding:30px;
border-radius:20px;
width:80%;
max-width:500px;
text-align:center;
}


.hidden{
display:none;
}


button{
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}


.warning{
color:#ff5555;
}


.green{
color:#55ff88;
}


#bar{
height:20px;
width:0%;
background:red;
transition:2s;
}

</style>

</head>


<body>


<div class="box" id="page1">

<h1>安全檢查中心</h1>

<p>
點擊開始進行安全確認
</p>

<button onclick="start()">
開始
</button>

</div>



<div class="box hidden" id="page2">

<h1>安全通知</h1>

<p>
偵測到異常連線
</p>


<button onclick="check()">
查看結果
</button>

</div>




<div class="box hidden" id="page3">

<h1 class="warning">
 分析中
</h1>


<div id="bar"></div>


<p id="text"></p>


</div>





<div class="box hidden" id="page4">

<h1 class="green">
 資安測試完成
</h1>


<p>
剛剛是模擬釣魚情境。
</p>


<p>

不要因為：
<br><br>

 緊急通知<br>
 免費獎勵<br>
 陌生連結

<br><br>

就直接點擊。

</p>


</div>




<script>


let userID =
new URLSearchParams(window.location.search)
.get("id")
||"unknown";



const scriptURL =
"https://script.google.com/macros/s/AKfycbw4k485xxaXhL1YX1pQH2m07qrAUcX3Lsr5zy7jhBdSPQxoaLmod9vt3UV4GZKYWOw-YA/exec";




function sendData(){

fetch(
scriptURL+"?id="+userID,
{
mode:"no-cors"
}
);

}





function start(){


document
.getElementById("page1")
.style.display="none";


document
.getElementById("page2")
.style.display="block";

}




function check(){


sendData();



document
.getElementById("page2")
.style.display="none";


document
.getElementById("page3")
.style.display="block";



setTimeout(()=>{

document
.getElementById("bar")
.style.width="100%";

},300);



setTimeout(()=>{


document
.getElementById("page3")
.style.display="none";


document
.getElementById("page4")
.style.display="block";


},3000);



}


</script>


</body>

</html>
