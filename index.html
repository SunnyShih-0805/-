<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>安全檢查中心</title>

<style>

body{
    margin:0;
    background:#101014;
    color:white;
    font-family:"Microsoft JhengHei",Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}


.box{
    width:85%;
    max-width:500px;
    background:#1e1e25;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px #000;
}


button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}


button:hover{
    opacity:0.8;
}


.hidden{
    display:none;
}


.warning{
    color:#ff5555;
}


.green{
    color:#4ade80;
}


#bar{
    width:0%;
    height:18px;
    background:#ff5555;
    border-radius:10px;
    transition:3s;
}


</style>

</head>


<body>


<div class="box" id="page1">

<h1>🔐 安全檢查中心</h1>

<p>
偵測到系統需要進行快速安全確認
</p>

<p>
請點擊下方開始檢查
</p>


<button onclick="start()">
開始檢查
</button>


</div>



<div class="box hidden" id="page2">

<h1>⚠️ 安全通知</h1>


<p>
發現未知連線活動
</p>


<p>
正在確認裝置狀態...
</p>


<button onclick="check()">
查看結果
</button>


</div>




<div class="box hidden" id="page3">


<h1 class="warning">
🚨 發現可疑操作
</h1>


<p>
分析連線中...
</p>


<div id="bar"></div>


<p id="loading">
</p>


</div>





<div class="box hidden" id="page4">


<h1 class="green">
😂 資安測試完成
</h1>


<p>
你的裝置沒有問題。
</p>


<hr>


<h3>
剛剛模擬的是社交工程攻擊
</h3>


<p>

駭客常利用：

<br><br>

⚠️ 緊急通知<br>

🎁 免費獎勵<br>

🔗 陌生連結<br>

😨 製造恐慌

<br><br>

讓使用者沒有確認就點擊。

</p>


<h3>
資安習慣：
</h3>


<p>

✅ 檢查網址來源<br>

✅ 不隨便點陌生連結<br>

✅ 不輸入未知網站資訊

</p>


</div>




<script>


const scriptURL =
"https://script.google.com/macros/s/AKfycbw4k485xxaXhL1YX1pQH2m07qrAUcX3Lsr5zy7jhBdSPQxoaLmod9vt3UV4GZKYWOw-YA/exec";



let userID =
new URLSearchParams(location.search).get("id")
|| "unknown";




// 進入網站就紀錄

function sendData(){

fetch(
scriptURL+"?id="+encodeURIComponent(userID),
{
method:"GET",
mode:"no-cors"
}
);

}



sendData();





function start(){

document
.getElementById("page1")
.classList.add("hidden");


document
.getElementById("page2")
.classList.remove("hidden");


}





function check(){


document
.getElementById("page2")
.classList.add("hidden");


document
.getElementById("page3")
.classList.remove("hidden");



setTimeout(function(){

document
.getElementById("bar")
.style.width="100%";


},300);




setTimeout(function(){


document
.getElementById("loading")
.innerHTML=
"正在分析...<br><br>⚠️ 發現：你點擊了未確認來源的連結";


},1500);





setTimeout(function(){


document
.getElementById("page3")
.classList.add("hidden");


document
.getElementById("page4")
.classList.remove("hidden");


},4000);



}


</script>



</body>

</html>
