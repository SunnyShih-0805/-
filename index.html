<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>校園資安小測驗</title>

<style>
body{
    font-family: Arial, "Microsoft JhengHei";
    background:#111;
    color:white;
    text-align:center;
    padding-top:80px;
}

.box{
    width:80%;
    max-width:500px;
    margin:auto;
    background:#222;
    padding:30px;
    border-radius:20px;
}

button{
    font-size:20px;
    padding:15px 30px;
    margin-top:20px;
    cursor:pointer;
    border-radius:10px;
}

.warning{
    color:#ff4444;
    font-size:28px;
}

.green{
    color:#55ff88;
}

.hidden{
    display:none;
}

#bar{
    width:0%;
    height:20px;
    background:#ff4444;
    transition:2s;
}
</style>

</head>

<body>

<!-- 第二頁 -->
<div class="box hidden" id="page2">

<h1>⚠️ 安全通知</h1>

<p>
偵測到您的裝置出現異常活動
</p>

<p>
正在進行安全檢查...
</p>

<button onclick="clickReward()">
立即查看
</button>

</div>


<!-- 第三頁 -->
<div class="box hidden" id="page3">

<h1 class="warning">
🚨 警告：發現可疑操作
</h1>

<p>
正在分析連線狀態...
</p>

<div id="bar"></div>

<p id="result"></p>

</div>


<!-- 第四頁 -->
<div class="box hidden" id="page4">

<h1 class="green">
😎 安全測試完成
</h1>

<p>
剛剛的「安全通知」是模擬的。
</p>

<hr>

<h3>
你剛剛遇到的是常見的社交工程技巧：
</h3>

<p>

🔸 製造緊迫感<br>
「立即處理」「帳號異常」<br><br>

🔸 引導點擊<br>
讓使用者在沒有思考時操作<br><br>

🔸 假裝來自系統通知

</p>

<h3>
下次看到類似訊息：
</h3>

<p>
先確認來源，再點擊連結。
</p>

</div>


<script>

let userID =
new URLSearchParams(location.search).get("id")
|| "unknown";


console.log(
"有人參與資安測試：",
userID
);
    

function start(){

document.getElementById("page1")
.classList.add("hidden");

document.getElementById("page2")
.classList.remove("hidden");

}



function clickReward(){

console.log(
"有人參與資安測試：",
userID
);


//送紀錄到 Google Sheet
fetch(
"https://script.google.com/macros/s/AKfycbw4k485xxaXhL1YX1pQH2m07qrAUcX3Lsr5zy7jhBdSPQxoaLmod9vt3UV4GZKYWOw-YA/exec?id="
+ userID,
{
method:"GET",
mode:"no-cors"
}
);



document.getElementById("page2")
.classList.add("hidden");

document.getElementById("page3")
.classList.remove("hidden");



setTimeout(()=>{

document.getElementById("bar")
.style.width="100%";

},300);



setTimeout(()=>{

document.getElementById("result")
.innerHTML =
"分析完成...<br><br>⚠️ 你剛剛點擊了未確認來源的連結";

},1500);



setTimeout(()=>{

document.getElementById("page3")
.classList.add("hidden");

document.getElementById("page4")
.classList.remove("hidden");

},3500);


}
</script>


</body>
</html>
